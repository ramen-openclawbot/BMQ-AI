services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - relay
    env_file:
      - ./.env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?Set CLOUDFLARED_TOKEN in /opt/bmq-otp-relay/.env}
    networks:
      - otp_relay
